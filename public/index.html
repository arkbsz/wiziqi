<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <title>五子棋</title>
  <style>
    :root {
      --bg: #fff7ec;
      --panel: rgba(255, 249, 240, 0.96);
      --panel-border: rgba(160, 104, 58, 0.22);
      --accent: #d46a39;
      --accent-strong: #b84f23;
      --text: #402514;
      --muted: #86624f;
      --shadow: 0 14px 28px rgba(108, 67, 38, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, #fffdf7 0%, #fff7ec 38%, #f5e1c9 100%);
      color: var(--text);
      font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }

    body {
      position: relative;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      cursor: pointer;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
    }

    .screen.active {
      display: flex;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .primary-btn,
    .secondary-btn {
      width: 100%;
      min-height: 56px;
      border-radius: 18px;
      font-size: 18px;
      font-weight: 700;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .primary-btn:active,
    .secondary-btn:active,
    .icon-btn:active,
    .mini-btn:active {
      transform: scale(0.98);
    }

    .primary-btn {
      color: #fff;
      background: linear-gradient(180deg, #eb8151 0%, #d46031 100%);
      box-shadow: 0 10px 18px rgba(212, 106, 57, 0.26);
    }

    .secondary-btn {
      color: var(--accent-strong);
      background: rgba(255, 243, 232, 0.98);
      border: 1px solid rgba(184, 79, 35, 0.2);
    }

    .menu-screen {
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 26px 22px 30px;
      text-align: center;
    }

    .menu-top {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: slide-down 420ms ease;
    }

    .menu-cover {
      width: min(250px, 74vw);
      height: auto;
      object-fit: contain;
    }

    .menu-title {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .menu-subtitle {
      color: var(--muted);
      font-size: 15px;
    }

    .menu-actions {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: rise-up 450ms ease;
    }

    .menu-bottom {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .menu-gif {
      width: min(250px, 74vw);
      height: auto;
      object-fit: contain;
    }

    .online-screen,
    .waiting-screen {
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(255, 247, 236, 0.95);
    }

    .dialog {
      width: min(100%, 360px);
      padding: 22px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .dialog-title {
      font-size: 26px;
      font-weight: 800;
      text-align: center;
    }

    .dialog-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
    }

    .text-input {
      width: 100%;
      min-height: 50px;
      padding: 0 14px;
      border-radius: 16px;
      border: 1px solid rgba(139, 92, 57, 0.18);
      background: rgba(255, 255, 255, 0.86);
      color: var(--text);
      outline: none;
    }

    .text-input:focus {
      border-color: rgba(212, 106, 57, 0.55);
      box-shadow: 0 0 0 3px rgba(212, 106, 57, 0.14);
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row > * {
      flex: 1;
    }

    .room-code-pill {
      min-height: 64px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #fff9f3 0%, #ffe8d5 100%);
      color: var(--accent-strong);
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 4px;
    }

    .game-screen {
      flex-direction: column;
      background:
        linear-gradient(180deg, rgba(255, 248, 238, 0.95) 0%, rgba(246, 227, 201, 0.92) 100%);
    }

    .game-banner {
      width: 100%;
      height: 108px;
      object-fit: contain;
      background: rgba(255, 245, 232, 0.9);
    }

    .game-header {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      background: rgba(255, 249, 240, 0.88);
      border-bottom: 1px solid rgba(150, 101, 61, 0.12);
    }

    .header-left,
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn,
    .mini-btn {
      min-width: 42px;
      min-height: 42px;
      padding: 0 12px;
      border-radius: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(150, 101, 61, 0.16);
    }

    .mini-btn {
      min-width: 70px;
      font-weight: 700;
      font-size: 14px;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(150, 101, 61, 0.14);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.hidden {
      display: none;
    }

    .conn-ok {
      color: #197b30;
    }

    .conn-bad {
      color: #b23b25;
    }

    .board-shell {
      flex: 1;
      min-height: 0;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: board-in 360ms ease;
    }

    .board-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #board-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .turn-bar {
      min-height: 56px;
      padding: 10px 14px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .turn-chip {
      min-width: 240px;
      max-width: 100%;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(255, 249, 240, 0.94);
      border: 1px solid rgba(150, 101, 61, 0.14);
      box-shadow: 0 10px 20px rgba(115, 76, 48, 0.08);
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .stone-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .stone-dot.black {
      background: radial-gradient(circle at 30% 30%, #8b7569 0%, #5f493d 55%, #3f3028 100%);
    }

    .stone-dot.white {
      background: radial-gradient(circle at 30% 30%, #fffdf7 0%, #fff1cb 58%, #f2d37a 100%);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .game-menu {
      position: absolute;
      top: 60px;
      left: 10px;
      width: 144px;
      padding: 8px;
      display: none;
      flex-direction: column;
      gap: 8px;
      z-index: 20;
    }

    .game-menu.show {
      display: flex;
    }

    .menu-item {
      min-height: 42px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      border: 1px solid rgba(150, 101, 61, 0.12);
      font-weight: 700;
    }

    .menu-item.danger {
      color: #b23b25;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(64, 37, 20, 0.32);
      z-index: 30;
    }

    .overlay.show {
      display: flex;
    }

    .overlay-card {
      width: min(100%, 320px);
      padding: 24px 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .result-image {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    .result-title {
      font-size: 28px;
      font-weight: 900;
    }

    .result-subtitle {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .overlay-actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 84px;
      transform: translateX(-50%);
      min-width: 180px;
      max-width: calc(100vw - 32px);
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(58, 38, 26, 0.9);
      color: #fffaf4;
      font-size: 14px;
      text-align: center;
      z-index: 40;
      box-shadow: 0 10px 18px rgba(58, 38, 26, 0.22);
    }

    @keyframes slide-down {
      from {
        opacity: 0;
        transform: translateY(-18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes rise-up {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes board-in {
      from {
        opacity: 0;
        transform: scale(0.98);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <section id="menu-screen" class="screen menu-screen active">
    <div class="menu-top">
      <img class="menu-cover" src="cover.png" alt="封面">
      <h1 class="menu-title">五子棋</h1>
      <p class="menu-subtitle">本地对战和联机对战都能直接开局</p>
    </div>

    <div class="menu-actions">
      <button id="local-btn" class="primary-btn" type="button">本地对战</button>
      <button id="online-btn" class="secondary-btn" type="button">联机对战</button>
    </div>

    <div class="menu-bottom">
      <img class="menu-gif" src="cover_anim.gif" alt="封面动图">
    </div>
  </section>

  <section id="online-screen" class="screen online-screen">
    <div class="dialog panel">
      <h2 class="dialog-title">联机对战</h2>
      <p class="dialog-text">输入服务器地址后创建房间，或输入 4 位房间号加入对局。</p>

      <label class="input-group">
        <span class="input-label">服务器地址</span>
        <input
          id="server-url"
          class="text-input"
          type="text"
          inputmode="url"
          placeholder="ws://电脑IP:4000 或 wss://公网地址"
        >
      </label>

      <label class="input-group">
        <span class="input-label">房间号</span>
        <input
          id="room-code-input"
          class="text-input"
          type="text"
          inputmode="numeric"
          maxlength="4"
          placeholder="输入 4 位房间号"
        >
      </label>

      <div class="row">
        <button id="create-room-btn" class="primary-btn" type="button">创建房间</button>
        <button id="join-room-btn" class="secondary-btn" type="button">加入房间</button>
      </div>

      <button id="online-back-btn" class="secondary-btn" type="button">返回主菜单</button>
    </div>
  </section>

  <section id="waiting-screen" class="screen waiting-screen">
    <div class="dialog panel">
      <h2 class="dialog-title">等待加入</h2>
      <p class="dialog-text">把下面的房间号发给对方，对方加入后会自动开始。</p>
      <div id="room-code-display" class="room-code-pill">----</div>
      <button id="waiting-cancel-btn" class="secondary-btn" type="button">取消等待</button>
    </div>
  </section>

  <section id="game-screen" class="screen game-screen">
    <img class="game-banner" src="board_top.jpeg" alt="顶部装饰">

    <header class="game-header">
      <div class="header-left">
        <button id="menu-btn" class="icon-btn" type="button">菜单</button>
        <div id="game-mode-label" class="badge">本地</div>
      </div>
      <div class="header-right">
        <div id="room-code-badge" class="badge hidden">房间 ----</div>
        <div id="conn-status" class="badge hidden">未连接</div>
      </div>
    </header>

    <div id="board-shell" class="board-shell">
      <div id="board-wrap" class="board-wrap">
        <canvas id="board-canvas"></canvas>
      </div>
    </div>

    <footer class="turn-bar">
      <div class="turn-chip">
        <span id="turn-stone" class="stone-dot black"></span>
        <span id="turn-text">黑棋回合</span>
      </div>
    </footer>
  </section>

  <div id="game-menu" class="game-menu panel">
    <button id="undo-btn" class="menu-item" type="button">悔棋</button>
    <button id="restart-btn" class="menu-item" type="button">重新开始</button>
    <button id="quit-btn" class="menu-item danger" type="button">退出对局</button>
  </div>

  <div id="game-over-overlay" class="overlay">
    <div class="overlay-card panel">
      <img class="result-image" src="获胜.png" alt="结果图">
      <div id="result-title" class="result-title">对局结束</div>
      <div id="result-subtitle" class="result-subtitle">再来一局吧</div>
      <div class="overlay-actions">
        <button id="overlay-restart-btn" class="primary-btn" type="button">再来一局</button>
        <button id="overlay-menu-btn" class="secondary-btn" type="button">返回主菜单</button>
      </div>
    </div>
  </div>

  <script src="game.js" defer></script>
</body>
</html>
